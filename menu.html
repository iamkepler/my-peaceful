<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none' stroke='%23455A64' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'><path d='M35 90 L65 90 L60 30 L40 30 Z' /><path d='M40 30 L60 30 L55 20 L45 20 Z' /><line x1='45' y1='25' x2='10' y2='10' /><line x1='55' y1='25' x2='90' y2='10' /></svg>">
    <title>屿你，共赴晨昏 - 放松中心</title>
    
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="menu-page">

    <audio id="bgMusic" loop>
        <source src="assets/bg-music.mp3" type="audio/mpeg">
    </audio>

    <div class="side-controls">
        <div class="toggle-container">
            <input type="checkbox" id="themeCheckbox">
            <label for="themeCheckbox" class="toggle-label">
                <div class="toggle-slider">
                    <span class="icon" id="themeIcon">🌙</span>
                </div>
            </label>
        </div>

        <div class="volume-container">
            <button id="muteBtn" class="volume-btn">🔊</button>
        </div>
    </div>

    <div id="particles"></div>

    <main class="content-wrapper" id="mainContent">
        
        <h1 class="menu-title">放空大脑试试</h1>
        
        <div class="menu-grid">
            <div class="menu-card" onclick="location.href='zen-draw.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                        <circle cx="50" cy="50" r="10" fill="currentColor" />
                        <path d="M50 20 L50 35 M50 65 L50 80 M20 50 L35 50 M65 50 L80 50" />
                        <path d="M30 30 L40 40 M60 60 L70 70 M30 70 L40 60 M60 40 L70 30" />
                    </svg>
                </div>
                <h3>折点小星星</h3>
                <p>生活处处有惊喜</p>
                <p>不信？你滑</p>
            </div>
            
            <div class="menu-card" onclick="location.href='untangle.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                        <path d="M20 50 Q 35 20 50 50 T 80 50" stroke-dasharray="4 4" />
                        <path d="M20 50 L 80 50" />
                    </svg>
                </div>
                <h3>乱七八糟</h3>
                <p>很喜欢收拾整理right？</p>
                <p>来 收拾这个</p>
            </div>

            <div class="menu-card" onclick="location.href='memory-match.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                        <path d="M20 50 Q 35 20 50 50 T 80 50" stroke-dasharray="4 4" />
                        <path d="M20 50 L 80 50" />
                    </svg>
                </div>
                <h3>脑筋不用急转弯</h3>
                <p>喜欢用脑就进来</p>
                <p>看你配不配嘿嘿</p>
            </div>

            <div class="menu-card" onclick="location.href='breathe.html'">
                <div class="card-icon">
                    <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round">
                        <circle cx="50" cy="50" r="25" />
                        <circle cx="50" cy="50" r="15" fill="currentColor" opacity="0.3" />
                    </svg>
                </div>
                <h3>音乐细胞?</h3>
                <p>证明你是节奏大师的时候到了</p>
            </div>
        </div>

        <button class="back-btn" id="exitMenuBtn">让小脑袋瓜休息一下</button>
    </main>

    <div id="messageOverlay" class="hidden">
        <p id="healingMessage"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>

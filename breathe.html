<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>节奏大师 Show Time</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none' stroke='%23455A64' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'><path d='M35 90 L65 90 L60 30 L40 30 Z' /><path d='M40 30 L60 30 L55 20 L45 20 Z' /><line x1='45' y1='25' x2='10' y2='10' /><line x1='55' y1='25' x2='90' y2='10' /></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23FFD54F'><path d='M35 90 L65 90 L60 30 L40 30 Z' /><path d='M40 30 L60 30 L55 20 L45 20 Z' /></svg>">
    <style>
        .breathe-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .breathe-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--star-core);
            box-shadow: 0 0 30px var(--star-glow-inner), 0 0 60px var(--star-glow-outer);
            position: relative;
            transition: transform 0.1s linear; 
        }

        .breathe-circle::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            border: 2px solid var(--star-glow-inner);
            opacity: 0.3;
        }

        .breathe-instruction {
            margin-top: 80px;
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 28px;
            color: var(--text-color);
            min-height: 40px;
            transition: opacity 0.5s ease;
        }

        .breathe-hint {
            margin-top: 15px;
            font-size: 18px;
            opacity: 0.5;
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .ui-layer {
            position: fixed;
            bottom: 40px;
            width: 100%;
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .exit-btn {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--toggle-border);
            padding: 10px 25px;
            border-radius: 20px;
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .exit-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="assets/bg-music.mp3" type="audio/mpeg">
    </audio>

    <div class="side-controls">
        <div class="toggle-container">
            <input type="checkbox" id="themeCheckbox">
            <label for="themeCheckbox" class="toggle-label">
                <div class="toggle-slider">
                    <span class="icon" id="themeIcon">🌙</span>
                </div>
            </label>
        </div>

        <div class="volume-container">
            <button id="muteBtn" class="volume-btn">🔊</button>
        </div>
    </div>

    <div id="particles"></div>

    <div class="breathe-container">
        <div class="breathe-circle" id="orb"></div>
        <div class="breathe-instruction" id="instruction">准备开始...</div>
        <div class="breathe-hint" id="timerHint">跟随光的节奏</div>
    </div>

    <div class="ui-layer">
        <button class="exit-btn" onclick="location.href='menu.html'">Back to Main Menu</button>
    </div>

    <script src="script.js"></script>
    <script>
        const orb = document.getElementById('orb');
        const instruction = document.getElementById('instruction');
        const timerHint = document.getElementById('timerHint');

        const stages = [
            { text: "用力吸...", duration: 4000, scale: 1.8, hint: "Inhale" },
            { text: "憋着...", duration: 7000, scale: 1.8, hint: "Hold" },
            { text: "慢慢呼...", duration: 8000, scale: 1.0, hint: "Exhale" }
        ];

        let currentStage = 0;

        function startBreathe() {
            const stage = stages[currentStage];
            
            instruction.style.opacity = 0;
            setTimeout(() => {
                instruction.innerText = stage.text;
                timerHint.innerText = stage.hint;
                instruction.style.opacity = 1;
            }, 500);

            orb.style.transition = `transform ${stage.duration}ms ease-in-out`;
            orb.style.transform = `scale(${stage.scale})`;

            setTimeout(() => {
                currentStage = (currentStage + 1) % stages.length;
                startBreathe();
            }, stage.duration);
        }

        setTimeout(startBreathe, 2000);
    </script>
</body>
</html>
